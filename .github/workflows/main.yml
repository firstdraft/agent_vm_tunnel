name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { ruby: '3.3', rails: '7.0' }
          - { ruby: '3.3', rails: '7.1' }
          - { ruby: '3.3', rails: '7.2' }
          - { ruby: '3.3', rails: '8.0' }
          - { ruby: '3.3', rails: '8.1' }
          - { ruby: '3.4', rails: '7.2' }
          - { ruby: '3.4', rails: '8.0' }
          - { ruby: '3.4', rails: '8.1' }
          - { ruby: '4.0', rails: '8.1' }

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}.gemfile
      - name: Run the default task
        run: bundle exec rake
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}.gemfile
