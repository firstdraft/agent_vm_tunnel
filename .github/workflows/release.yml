name: Release

# Publishes to RubyGems via trusted publishing (OIDC — no API key stored in the
# repo). One-time setup on rubygems.org: gem → Trusted publishers → add this
# GitHub repository + the "rubygems" environment. Then release by pushing a tag:
#
#   gem bump --version 0.1.1   # or edit lib/agent_vm_tunnel/version.rb
#   git commit -am "Release v0.1.1" && git tag v0.1.1 && git push --tags
#
# The release-gem action builds the gem, creates a GitHub Release, and pushes.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: rubygems
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake
      - name: Build + push to RubyGems (trusted publishing)
        uses: rubygems/release-gem@v1
